name: PHP Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    name: PHP Syntax Check

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: none

      - name: Check PHP syntax (local plugin)
        run: |
          find local/securevideo -name "*.php" -exec php -l {} \; | grep -v "^No syntax"
          echo "local/securevideo: syntax OK"

      - name: Check PHP syntax (activity module)
        run: |
          find mod/securevideo -name "*.php" -exec php -l {} \; | grep -v "^No syntax"
          echo "mod/securevideo: syntax OK"

      - name: Check for sensitive data
        run: |
          if grep -r "password.*=.*['\"].\+['\"]" local/ mod/ --include="*.php"; then
            echo "WARNING: Possible hardcoded password found"
            exit 1
          fi
          echo "No hardcoded passwords found"
