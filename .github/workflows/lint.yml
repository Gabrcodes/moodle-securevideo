name: PHP Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    name: PHP Syntax Check

    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: none
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Check PHP syntax (local plugin)
        run: |
          ERRORS=0
          while IFS= read -r file; do
            if ! php -l "$file" > /dev/null 2>&1; then
              php -l "$file"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find local/securevideo -name "*.php")
          if [ "$ERRORS" -eq 0 ]; then
            echo "local/securevideo: all files OK"
          else
            echo "local/securevideo: $ERRORS file(s) with syntax errors"
            exit 1
          fi

      - name: Check PHP syntax (activity module)
        run: |
          ERRORS=0
          while IFS= read -r file; do
            if ! php -l "$file" > /dev/null 2>&1; then
              php -l "$file"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find mod/securevideo -name "*.php")
          if [ "$ERRORS" -eq 0 ]; then
            echo "mod/securevideo: all files OK"
          else
            echo "mod/securevideo: $ERRORS file(s) with syntax errors"
            exit 1
          fi

      - name: Check for sensitive data
        run: |
          if grep -rn "password[[:space:]]*=[[:space:]]*['\"][^'\"]\+['\"]" local/ mod/ --include="*.php"; then
            echo "WARNING: Possible hardcoded password found"
            exit 1
          fi
          echo "No hardcoded passwords found"
